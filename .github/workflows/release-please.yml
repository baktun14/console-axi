name: release-please

# Automated releases. On every push to main, release-please maintains a "release
# PR" that bumps the version (from Conventional Commits) and CHANGELOG. Merging
# that PR creates the git tag + GitHub Release; this same run then cross-compiles
# the standalone binaries and attaches them. No manual tagging, no PAT — the binary
# build is gated on release_created, so it runs in the same workflow as the release.

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  binaries:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Build standalone binaries
        run: npm run build:bin

      # Gate the release on the exact binary we are about to ship: the e2e
      # suite re-runs against the compiled linux-x64 artifact, catching any
      # Bun-runtime divergence before assets attach.
      - name: E2E test the shipped binary
        env:
          E2E_CLI: dist-bin/console-axi-linux-x64
        run: |
          npm run build
          chmod +x dist-bin/console-axi-linux-x64
          npx vitest run --project e2e

      - name: Attach binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" \
            dist-bin/console-axi-darwin-arm64.gz \
            dist-bin/console-axi-darwin-x64.gz \
            dist-bin/console-axi-linux-x64.gz \
            dist-bin/console-axi-linux-arm64.gz \
            dist-bin/console-axi-darwin-arm64 \
            dist-bin/console-axi-darwin-x64 \
            dist-bin/console-axi-linux-x64 \
            dist-bin/console-axi-linux-arm64 \
            dist-bin/SHA256SUMS \
            install.sh \
            skills/console-axi/SKILL.md \
            --repo "$GITHUB_REPOSITORY"
