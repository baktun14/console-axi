---
version: "2.0"

services:
  web:
    image: nginx:1.27
    expose:
      - port: 80
        as: 80
        to:
          - global: true

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 0.1
        memory:
          size: 128Mi
        storage:
          size: 256Mi
  placement:
    dcloud:
      pricing:
        web:
          denom: uact
          amount: 10000

deployment:
  web:
    dcloud:
      profile: web
      count: 1
